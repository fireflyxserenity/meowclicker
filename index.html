<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Down for Maintenance</title>
<style>
  :root{
    --bg1:#0f0c29;
    --bg2:#302b63;
    --bg3:#24243e;
    --neon1:#00f5ff;  /* aqua */
    --neon2:#ff6bff;  /* pink */
    --neon3:#9bff8d;  /* mint */
  }

  /* Reset + layout */
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
    color: white;
    background: radial-gradient(1200px 800px at 20% 10%, #1a1636 0%, transparent 60%),
                radial-gradient(1000px 700px at 80% 80%, #1a2942 0%, transparent 60%),
                linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    overflow: hidden;
  }
  .wrap {
    position: relative;
    height: 100%;
    display: grid;
    place-items: center;
    padding: 24px;
  }

  /* Floating sparkles (cute vibes) */
  .sparkles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    filter: drop-shadow(0 0 8px rgba(255,255,255,.65));
  }
  .sparkles i{
    position: absolute;
    font-style: normal;
    opacity: .9;
    animation: floaty linear infinite;
    user-select: none;
  }
  /* Position a handful of sparkles */
  .sparkles i:nth-child(1){ top:12%; left:16%; animation-duration: 12s; }
  .sparkles i:nth-child(2){ top:22%; right:14%; animation-duration: 10s; }
  .sparkles i:nth-child(3){ bottom:18%; left:10%; animation-duration: 14s; }
  .sparkles i:nth-child(4){ bottom:24%; right:12%; animation-duration: 11s; }
  .sparkles i:nth-child(5){ top:50%; left:6%;  animation-duration: 15s; }
  .sparkles i:nth-child(6){ top:8%;  right:6%; animation-duration: 13s; }
  .sparkles i:nth-child(7){ bottom:8%; left:50%; animation-duration: 12s; }

  @keyframes floaty {
    0%   { transform: translateY(0) scale(1); opacity:.9; }
    50%  { transform: translateY(-12px) scale(1.05); opacity:1; }
    100% { transform: translateY(0) scale(1); opacity:.9; }
  }

  /* Neon sign frame */
  .sign {
    position: relative;
    padding: clamp(24px, 5vw, 48px) clamp(28px, 6vw, 64px);
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,.15);
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(6px);
    box-shadow:
      0 0 0 2px rgba(255,255,255,.06) inset,
      0 0 30px rgba(0, 245, 255, .25),
      0 0 60px rgba(255, 107, 255, .15);
    text-align: center;
    isolation: isolate;
  }

  /* Glowing corners */
  .sign::before, .sign::after {
    content:"";
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background:
      conic-gradient(from 0deg,
        var(--neon1), var(--neon2), var(--neon3), var(--neon1));
    mask:
      linear-gradient(#000 0 0) content-box, 
      linear-gradient(#000 0 0);
    -webkit-mask:
      linear-gradient(#000 0 0) content-box, 
      linear-gradient(#000 0 0);
    padding: 2px;
    opacity: .25;
    z-index: -1;
    animation: spin 16s linear infinite;
  }
  .sign::after{
    filter: blur(14px);
    opacity: .35;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Main neon text */
  h1 {
    margin: 0;
    font-size: clamp(28px, 8vw, 72px);
    letter-spacing: .08em;
    font-weight: 800;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--neon1), var(--neon2), var(--neon3));
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 6s ease-in-out infinite;
    text-shadow:
      0 0 8px rgba(0,245,255,.6),
      0 0 18px rgba(255,107,255,.5),
      0 0 36px rgba(155,255,141,.35);
  }
  @keyframes shimmer {
    0%,100% { background-position: 0% 50%; }
    50%     { background-position: 100% 50%; }
  }

  /* Cute subline (optional – remove if you only want the big text) */
  .sub {
    margin-top: 12px;
    font-size: clamp(12px, 2.6vw, 16px);
    opacity: .9;
    text-shadow: 0 0 8px rgba(255,255,255,.3);
  }

  /* Tiny pulsing heart/cat paw for extra cuteness */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 18px;
    font-size: clamp(12px, 2.6vw, 14px);
    opacity: .95;
  }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--neon2);
    box-shadow: 0 0 10px var(--neon2), 0 0 20px var(--neon2);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: .9; }
    50%     { transform: scale(1.25); opacity: 1; }
  }

  /* Accessibility: prefers-reduced-motion */
  @media (prefers-reduced-motion: reduce){
    .sparkles i, .sign::before, .sign::after, h1 { animation: none; }
  }
</style>
</head>
<body>
  <div class="wrap" role="main" aria-label="Site is down for maintenance">
    <div class="sparkles" aria-hidden="true">
      <i>✦</i><i>❀</i><i>✦</i><i>☾</i><i>✧</i><i>❤</i><i>✦</i>
    </div>

    <div class="sign" aria-live="polite">
      <h1>DOWN FOR MAINTENANCE</h1>
      <div class="sub">back soon — thanks for your patience</div>
      <div class="badge"><span class="dot" aria-hidden="true"></span> sending cozy vibes</div>
    </div>
  </div>
</body>
</html>
