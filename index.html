<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meow Clicker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <h1 class="title">MEOW CLICKER</h1>
        </div>
        <div class="header-right">
            <button id="profileBtn" class="header-btn">Profile</button>
            <button id="leaderboardBtn" class="header-btn">Leaderboard</button>
        </div>
    </header>

    <!-- Achievement notification banner -->
    <div id="achievementBanner" class="achievement-banner hidden">
        <span id="bannerText"></span>
        <button id="closeBanner">&times;</button>
    </div>


    <section class="stats">
        <div class="stat"><span id="totalMeows">0</span><br>Total Meows</div>
        <div class="stat"><span id="meowsPerSecond">0</span><br>Meows/sec</div>
        <div class="stat"><span id="meowsPerClick">1</span><br>Meows/click</div>
        <div class="stat"><span id="totalClicks">0</span><br>Total Clicks</div>
    </section>

    <main class="main-content">
        <div class="game-layout">
            <div class="cat-clicker">
                <button id="catButton" class="cat-btn">
                    <img id="mainCatImg" src="cat.png" alt="Cat" class="cat-img">
                    <div id="catFallback">🐾 Cat</div>
                </button>
                <div class="achievements">
                    <h3 class="achievements-header">Achievements</h3>
                    <div class="achievement-list">
                        <button class="achievement-btn" id="firstMeow">First Meow</button>
                        <button class="achievement-btn" id="hundredMeows">Meow Century</button>
                        <button class="achievement-btn" id="firstUpgrade">First Upgrade</button>
                        <button class="achievement-btn" id="thousandMeows">Meow Thousand</button>
                        <button class="achievement-btn" id="tenUpgrades">Upgrade Master</button>
                        <button class="achievement-btn" id="hundredThousandMeows">Meow Mogul</button>
                        <button class="achievement-btn" id="millionMeows">Meow Millionaire</button>
                        <button class="achievement-btn" id="fiftyUpgrades">Upgrade Legend</button>
                    </div>
                </div>
            </div>
            <section class="upgrades">
                <h2 class="upgrades-header">Upgrades</h2>
                    <div class="upgrade-list">
                        <button class="upgrade-btn" id="kittenHelper">Kitten Helper</button>
                        <button class="upgrade-btn" id="laserPointer">Laser Pointer</button>
                        <button class="upgrade-btn" id="catnipFarm">Catnip Farm</button>
                        <button class="upgrade-btn" id="catTower">Cat Tower</button>
                        <button class="upgrade-btn" id="catCafe">Cat Cafe</button>
                        <button class="upgrade-btn" id="meowingMachine">Meowing Machine</button>
                        <button class="upgrade-btn" id="catUniversity">Cat University</button>
                        <button class="upgrade-btn" id="interdimensionalCatPortal">Interdimensional Cat Portal</button>
                    </div>
            </section>
            
            <!-- Research Section -->
            <section class="research">
                <h3>
  <span aria-hidden="true">
    <img src="https://cdn3.emoji.gg/emojis/36389-sparkly-gold-cat.png"
         alt=""
         style="width:1em; height:1em; vertical-align:middle;">
  </span>
  Kitten Lab
</h3>
                <div id="researchUpgrades" class="research-upgrades">
                    <p style="color: #aaa; font-style: italic; text-align: center;">No kitten research available yet. Keep playing to unlock new discoveries!</p>
                </div>
            </section>
        </div>
    </main>
    </main>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" id="closeProfile">&times;</span>
            <h2>Edit Profile</h2>
            <label for="profileName">Name:</label>
            <input type="text" id="profileName" maxlength="16">
            <h3>Choose your cat:</h3>
            <div class="cat-photos">
                <img src="cat.png" class="cat-photo" data-cat="cat.png">
                <img src="https://cdn3.emoji.gg/emojis/7482-uwucat.png" class="cat-photo" data-cat="https://cdn3.emoji.gg/emojis/7482-uwucat.png">
                <img src="https://cdn3.emoji.gg/emojis/3301-kitty-blush.png" class="cat-photo" data-cat="https://cdn3.emoji.gg/emojis/3301-kitty-blush.png">
                <br>
                <img src="https://emoji.gg/assets/emoji/5903-cute-cat.png" class="cat-photo" data-cat="https://emoji.gg/assets/emoji/5903-cute-cat.png">
                <img src="https://cdn3.emoji.gg/emojis/8793-beluga.png" class="cat-photo" data-cat="https://cdn3.emoji.gg/emojis/8793-beluga.png">
                <img src="https://cdn3.emoji.gg/emojis/5802-cat-wtf.png" class="cat-photo" data-cat="https://cdn3.emoji.gg/emojis/5802-cat-wtf.png">
            </div>
            <button id="saveProfile">Save</button>
            
            <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 2px solid #ff6fff;">
                <h4 style="color: #fff; margin-bottom: 1rem;">Backup & Restore</h4>
                <button id="downloadDataBtn" class="header-btn" style="margin: 0.5rem;">Download Save</button>
                <label for="uploadDataInput" class="header-btn" style="cursor:pointer;display:inline-block;margin: 0.5rem;">Upload Save
                    <input type="file" id="uploadDataInput" accept="application/json" style="display:none;">
                </label>
            </div>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboardModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" id="closeLeaderboard">&times;</span>
            <h2>Leaderboard</h2>
            <ol id="leaderboardList"></ol>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAy3ebbhkexhmNKm5FaSuX-_yPxRDctHag",
            authDomain: "meow-clicker.firebaseapp.com",
            databaseURL: "https://meow-clicker-default-rtdb.firebaseio.com",
            projectId: "meow-clicker",
            storageBucket: "meow-clicker.firebasestorage.app",
            messagingSenderId: "38484030075",
            appId: "1:38484030075:web:d68da3a9fbd15c151968de"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Make Firebase available globally
        window.firebase = { database, ref, set, get, onValue };
    </script>
    <script src="script.js"></script>
</body>
</html>
